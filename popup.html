<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cookie Autopsy</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="site-info">
        <div class="domain" id="siteName">Analyzing...</div>
        <div class="status" id="riskStatus">Calculating risk...</div>
      </div>
      <div class="total-score" id="totalScore">--</div>
    </header>

    <!-- Summary Stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-val" id="totalCount">0</span>
        <span class="stat-label">Cookies</span>
      </div>
      <div class="stat-item">
        <span class="stat-val danger" id="trackerCount">0</span>
        <span class="stat-label">Trackers</span>
      </div>
      <div class="stat-item">
        <span class="stat-val safe" id="essentialCount">0</span>
        <span class="stat-label">Essential</span>
      </div>
    </div>

    <!-- Add this inside the .container div, right after .stats-bar -->
<div id="syncAlert" class="sync-alert" style="display: none;">
  <div class="sync-icon">⚠️</div>
  <div class="sync-content">
    <div class="sync-title">Tracker Sync Detected</div>
    <div class="sync-desc" id="syncDesc">Multiple companies are sharing your ID.</div>
  </div>
</div>
    <!-- Filters -->
    <div class="filter-bar">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="tracking">Trackers</button>
      <button class="filter" data-filter="advertising">Ads</button>
      <button class="filter" data-filter="analytics">Analytics</button>
      <button class="filter" data-filter="essential">Essential</button>
    </div>

    <!-- Cookie List -->
    <div class="cookie-list" id="cookieList">
      <!-- Items injected by JS -->
    </div>

    
    <!-- Actions -->
    <footer class="actions">
      <button id="blockTrackers" class="btn-danger">Block Trackers</button>
      <button id="exportBtn" class="btn-secondary">Export JSON</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
